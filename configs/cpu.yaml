# EdgeGPT CPU-friendly configuration.
# Keeps the tokenizer/model vocab contract intact while reducing model and
# batch sizes for laptops or machines without a useful CUDA GPU.

model:
  vocab_size: 16384
  d_model: 256
  n_layers: 4
  n_heads: 4
  n_kv_heads: 2
  d_ff: 704
  max_seq_len: 512
  rope_theta: 10000.0
  norm_eps: 1e-5
  embedding_scale: null
  tie_embeddings: true
  dropout: 0.0

training:
  batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 3.0e-4
  min_lr: 3.0e-5
  warmup_steps: 500
  max_steps: 50000
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  dtype: "fp32"
  eval_every: 500
  save_every: 2000
  log_every: 10

data:
  dataset: "tinystories"
  data_dir: "./data/tinystories"
  val_split: 0.005
  seed: 42
  source_type: "local_text"
  source_paths: []
  text_column: "text"
  cache_dir: "./artifacts/data/tinystories_cpu"
  storage_type: "memmap_bin"
  block_size: null
  shuffle_buffer_size: 10000
  num_workers: 0

tokenizer:
  type: "byte_bpe"
  vocab_size: 16384
  reserved_special_tokens: 256
  artifact_dir: "./artifacts/tokenizer/main_16k"
  train_files:
    - "./data/tinystories/train.txt"
  min_frequency: 2
  add_prefix_space: false
  split_digits: true

device: "cpu"

# EdgeGPT — Default Configuration
# Every magic number lives here. No hardcoded values in code.

model:
  # Architecture (Llama-compatible)
  vocab_size: 16384          # byte-level BPE, ~16k for laptop scale
  d_model: 512               # hidden dimension
  n_layers: 8                # transformer blocks
  n_heads: 8                 # query heads
  n_kv_heads: 4              # KV heads (GQA: groups of 2 query heads per KV head)
  d_ff: 1408                 # SwiGLU intermediate (≈ 8/3 * d_model, rounded)
  max_seq_len: 2048          # context length
  rope_theta: 10000.0        # RoPE base frequency
  norm_eps: 1e-5             # RMSNorm epsilon
  embedding_scale: null      # null = no scaling (Llama-style); set to sqrt(d_model) for Gemma-style
  tie_embeddings: true       # weight-tying input embeddings and output projection

  # Regularization
  dropout: 0.0               # no dropout for pretraining

training:
  batch_size: 8
  gradient_accumulation_steps: 4  # effective batch = 32
  learning_rate: 3.0e-4
  min_lr: 3.0e-5
  warmup_steps: 500
  max_steps: 50000
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  dtype: "bf16"              # bfloat16 where supported, else fp16
  eval_every: 500
  save_every: 2000
  log_every: 10

data:
  dataset: "tinystories"     # first stage dataset
  data_dir: "./data/tinystories"
  val_split: 0.005
  seed: 42
  source_type: "local_text"  # local_text now; jsonl and hf_streaming adapters can plug in later
  source_paths: []           # empty = discover train.txt or *.txt under data_dir
  text_column: "text"        # used when source_type is jsonl
  cache_dir: "./artifacts/data/tinystories"
  storage_type: "memmap_bin" # first storage backend; keeps training CPU-light
  block_size: null           # null = model.max_seq_len
  shuffle_buffer_size: 10000
  num_workers: 0

tokenizer:
  type: "byte_bpe"           # first backend; registry keeps future algorithms swappable
  vocab_size: 16384          # must match model.vocab_size
  reserved_special_tokens: 256
  artifact_dir: "./artifacts/tokenizer/main_16k"
  train_files:
    - "./data/tinystories/train.txt"
  min_frequency: 2
  add_prefix_space: false    # Llama/GPT-style byte BPE does not inject a leading space
  split_digits: true         # isolate digits before BPE so numbers stay compositional

# Inferred at runtime
device: "auto"               # cuda > mps > cpu
